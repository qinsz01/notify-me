name: Feature Request
description: Suggest a new feature or channel
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New notification channel
        - CLI improvement
        - Config improvement
        - Plugin integration
        - Other
