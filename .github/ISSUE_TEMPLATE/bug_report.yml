name: Bug Report
description: Report a bug in ai-ding
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ai-ding version
      placeholder: "e.g. 1.0.0"
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.0.0"
  - type: dropdown
    id: channel
    attributes:
      label: Notification channel
      options:
        - desktop
        - sound
        - telegram
        - slack
        - ntfy
        - bark
        - serverchan
        - email
        - other
